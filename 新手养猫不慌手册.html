function readImage(file, cb) {
  const r = new FileReader();
  r.onload = () => {
    const img = new Image();
    img.onload = () => {
      const sc = Math.min(1, 800 / Math.max(img.width, img.height));
      const cv = document.createElement("canvas");
      cv.width = Math.round(img.width * sc);
      cv.height = Math.round(img.height * sc);
      cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
      cb(cv.toDataURL("image/jpeg", 0.82));
    };
    img.onerror = () => cb(r.result);
    img.src = r.result;
  };
  r.readAsDataURL(file);
}

async function askClaude(system, messages) {
  const key = localStorage.getItem("cc_api_key") || "";
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 20000);
  let res, text;
  try {
    if (apiProvider() === "zhipu") {
      const base = (localStorage.getItem("cc_api_base") || ZHIPU_BASE).replace(/\/+$/, "");
      res = await fetch(base + "/v4/chat/completions", {
        method: "POST",
        signal: ctrl.signal,
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
        body: JSON.stringify({
          model: localStorage.getItem("cc_model") || "glm-4.7",
          thinking: { type: "disabled" },
          max_tokens: 1e3,
          messages: [{ role: "system", content: system }, ...messages]
        })
      });
      if (!res.ok) throw new Error("api " + res.status);
      text = (await res.json()).choices?.[0]?.message?.content || "";
    } else {
      const base = (localStorage.getItem("cc_api_base") || "https://api.anthropic.com").replace(/\/+$/, "");
      res = await fetch(base + "/v1/messages", {
        method: "POST",
        signal: ctrl.signal,
        headers: {
          "Content-Type": "application/json",
          "x-api-key": key,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: localStorage.getItem("cc_model") || "claude-sonnet-4-6",
          max_tokens: 1e3,
          system,
          messages
        })
      });
      if (!res.ok) throw new Error("api " + res.status);
      const data = await res.json();
      text = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("");
    }
  } finally {
    clearTimeout(timer);
  }
  return JSON.parse(text.replace(/```json|```/g, "").trim());
}
